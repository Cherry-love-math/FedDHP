name: feddhp
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy=1.26.4
  - pandas
  - scikit-learn
  - scipy
  - h5py
  - matplotlib
  - seaborn
  - ujson
  - tqdm
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8
  - pip:
      - torchtext==0.15.2
      - calmsize
      - portalocker
      - cvxpy==1.4.2
      - tensorboard
      - gdown
